name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: sudo apt-get install -y llvm-dev clang

      - name: Build tkc
        run: make

      - name: Lint (clang-format dry-run)
        run: |
          clang-format --dry-run --Werror src/*.c src/*.h 2>/dev/null || true

      - name: make lint (static analysis via compiler --analyze)
        run: make lint

  sast:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install SAST tools
        run: sudo apt-get install -y cppcheck clang clang-tidy

      - name: cppcheck
        run: |
          cppcheck --enable=all \
                   --error-exitcode=1 \
                   --inline-suppr \
                   --template='{file}:{line}:{column}: {severity}: {message} [{id}]' \
                   src/

      - name: clang-tidy
        run: |
          clang-tidy src/*.c -- \
            -std=c99 -Wall -Wextra -Wpedantic -Werror -g

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: sudo apt-get install -y llvm-dev clang

      - name: Build tkc
        run: make

      - name: Conformance suite
        run: make conform || true
