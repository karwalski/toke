name: Nightly fuzz
on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang
        run: sudo apt-get install -y clang
      - name: Build fuzz targets
        run: make CC=clang fuzz-lexer fuzz-parser
      - name: Run lexer fuzzer (60s)
        run: ./fuzz-lexer -max_total_time=60 -artifact_prefix=crash- test/fuzz/corpus/
      - name: Run parser fuzzer (60s)
        run: ./fuzz-parser -max_total_time=60 -artifact_prefix=crash- test/fuzz/corpus/
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: crash-*
